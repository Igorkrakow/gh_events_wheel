name: Build and Upload to DBFS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tools
        run: pip install build

      - name: Build wheel
        run: python -m build

      - name: Prepare artifact
        run: |
          mkdir build
          cp dist/*.whl build/app.whl

      - name: Install Databricks CLI
        run: pip install databricks-cli

      - name: Configure Databricks
        run: |
          databricks configure --token <<EOF
          ${{ secrets.DATABRICKS_HOST }}
          ${{ secrets.DATABRICKS_TOKEN }}
          EOF

      - name: Upload to DBFS
        run: |
          DATE=$(date +%Y-%m-%d_%H-%M-%S)

          BASE_PATH="dbfs:/FileStore/wheels/app"
          TARGET_PATH="$BASE_PATH/$DATE"

          echo "Uploading to $TARGET_PATH"

          databricks fs mkdirs "$TARGET_PATH"
          databricks fs cp build/app.whl "$TARGET_PATH/app.whl" --overwrite